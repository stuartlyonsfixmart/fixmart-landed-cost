<style>
  :root { --lime: #9ACD00; --lime-dark: #7aaa00; --black: #1a1a1a; --white: #fff; --offwhite: #f5f5f3; --border: #e0e0e0; --muted: #666; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Barlow', sans-serif; background: var(--offwhite); color: var(--black); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .login-wrap { width: 400px; }
  .login-header { margin-bottom: 32px; }
  .login-logo { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .logo-img { height: 28px; width: auto; }
  .login-title { font-family: 'Barlow Condensed', sans-serif; font-size: 32px; font-weight: 800; letter-spacing: 0.02em; text-transform: uppercase; color: var(--black); line-height: 1; }
  .login-title span { color: var(--lime-dark); }
  .login-sub { font-size: 12px; color: var(--muted); margin-top: 6px; }
  .login-card { background: var(--white); border: 1px solid var(--border); border-top: 3px solid var(--lime); padding: 32px; }
  .field { margin-bottom: 20px; }
  .field label { display: block; font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  .field input { width: 100%; background: var(--offwhite); border: 1px solid var(--border); color: var(--black); font-family: 'Barlow', sans-serif; font-size: 14px; padding: 9px 12px; outline: none; transition: border-color 0.15s; border-radius: 3px; }
  .field input:focus { border-color: var(--lime-dark); background: #fff; }
  .login-btn { width: 100%; background: var(--lime); border: none; color: var(--black); font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; padding: 11px; cursor: pointer; margin-top: 4px; border-radius: 3px; transition: background 0.15s; }
  .login-btn:hover { background: var(--lime-dark); }
  .error-msg { background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; font-size: 12px; padding: 10px 12px; margin-bottom: 20px; border-radius: 3px; display: none; }
  .error-msg.show { display: block; }
</style>
